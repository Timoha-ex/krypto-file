name: Mobile stars fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mobile-stars-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Make falling stars visible on mobile
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('script.js')
          s = p.read_text(encoding='utf-8')
          old = """// Легкі пролітаючі криптомонети на фоні
(()=>{if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;const style=document.createElement('style');style.textContent=`
.crypto-rain-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}.hp-crypto{position:relative;z-index:1}.crypto-fall{position:absolute;top:-90px;left:var(--start);width:var(--size);height:var(--size);display:grid;place-items:center;border:1px solid rgba(0,235,105,.28);border-radius:50%;color:rgba(0,235,105,.46);background:radial-gradient(circle,rgba(0,230,95,.12),rgba(0,0,0,.02) 70%);box-shadow:0 0 18px rgba(0,220,90,.12);font:700 calc(var(--size)*.48)/1 Arial,sans-serif;opacity:0;filter:blur(.1px);animation:cryptoMeteor var(--duration) linear forwards}.crypto-fall:after{content:'';position:absolute;width:90px;height:1px;right:70%;top:50%;background:linear-gradient(90deg,transparent,rgba(0,235,105,.22));transform:rotate(-28deg);transform-origin:right center}@keyframes cryptoMeteor{0%{transform:translate3d(0,-10vh,0) rotate(0deg) scale(.75);opacity:0}12%{opacity:var(--opacity)}82%{opacity:var(--opacity)}100%{transform:translate3d(var(--drift),115vh,0) rotate(540deg) scale(1);opacity:0}}@media(max-width:600px){.crypto-fall{filter:none}.crypto-fall:after{width:55px}}
`;document.head.appendChild(style);const layer=document.createElement('div');layer.className='crypto-rain-layer';layer.setAttribute('aria-hidden','true');document.body.prepend(layer);const symbols=['₿','Ξ','◎','◈'];function spawnCoin(){if(layer.childElementCount>=4)return;const coin=document.createElement('span');coin.className='crypto-fall';coin.textContent=symbols[Math.floor(Math.random()*symbols.length)];coin.style.setProperty('--start',`${5+Math.random()*88}%`);coin.style.setProperty('--size',`${28+Math.random()*24}px`);coin.style.setProperty('--duration',`${8+Math.random()*5}s`);coin.style.setProperty('--drift',`${-110+Math.random()*220}px`);coin.style.setProperty('--opacity',`${.22+Math.random()*.22}`);layer.appendChild(coin);coin.addEventListener('animationend',()=>coin.remove(),{once:true});}spawnCoin();setTimeout(spawnCoin,1800);setInterval(spawnCoin,4500+Math.random()*1800);})();"""
          new = """// Яскраві падаючі зірки та криптомонети на фоні, у тому числі на мобільних
(()=>{const style=document.createElement('style');style.textContent=`
.crypto-rain-layer{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}.hp-crypto{position:relative;z-index:1}.crypto-fall{position:absolute;top:-120px;left:var(--start);width:var(--size);height:var(--size);display:grid;place-items:center;border:1px solid rgba(80,255,155,.62);border-radius:50%;color:rgba(125,255,180,.9);background:radial-gradient(circle,rgba(0,255,125,.32),rgba(0,0,0,.03) 72%);box-shadow:0 0 24px rgba(0,255,125,.38),0 0 48px rgba(0,220,90,.2);font:800 calc(var(--size)*.5)/1 Arial,sans-serif;opacity:0;filter:drop-shadow(0 0 8px rgba(80,255,155,.65));animation:cryptoMeteor var(--duration) linear forwards;will-change:transform,opacity}.crypto-fall:after{content:'';position:absolute;width:150px;height:2px;right:68%;top:50%;background:linear-gradient(90deg,transparent,rgba(100,255,175,.72));transform:rotate(-28deg);transform-origin:right center;box-shadow:0 0 10px rgba(80,255,155,.45)}@keyframes cryptoMeteor{0%{transform:translate3d(0,-14vh,0) rotate(0deg) scale(.72);opacity:0}8%{opacity:var(--opacity)}86%{opacity:var(--opacity)}100%{transform:translate3d(var(--drift),118vh,0) rotate(540deg) scale(1.05);opacity:0}}@media(max-width:600px){.crypto-rain-layer{z-index:3}.crypto-fall{border-color:rgba(110,255,180,.78);color:rgba(165,255,205,.98);background:radial-gradient(circle,rgba(0,255,135,.46),rgba(0,0,0,.02) 74%);box-shadow:0 0 26px rgba(0,255,135,.5),0 0 55px rgba(0,220,90,.28);filter:drop-shadow(0 0 10px rgba(110,255,180,.82))}.crypto-fall:after{width:120px;height:2px;background:linear-gradient(90deg,transparent,rgba(140,255,200,.88))}}
`;document.head.appendChild(style);const layer=document.createElement('div');layer.className='crypto-rain-layer';layer.setAttribute('aria-hidden','true');document.body.appendChild(layer);const mobile=matchMedia('(max-width:600px)').matches;const symbols=['★','✦','✧','₿','Ξ','◎'];const maxCount=mobile?8:6;function spawnCoin(){if(layer.childElementCount>=maxCount)return;const coin=document.createElement('span');coin.className='crypto-fall';coin.textContent=symbols[Math.floor(Math.random()*symbols.length)];coin.style.setProperty('--start',`${2+Math.random()*94}%`);coin.style.setProperty('--size',`${mobile?20+Math.random()*22:26+Math.random()*25}px`);coin.style.setProperty('--duration',`${mobile?5.8+Math.random()*3.2:7+Math.random()*4}s`);coin.style.setProperty('--drift',`${-130+Math.random()*260}px`);coin.style.setProperty('--opacity',`${mobile?.72+Math.random()*.24:.46+Math.random()*.28}`);layer.appendChild(coin);coin.addEventListener('animationend',()=>coin.remove(),{once:true});}for(let i=0;i<(mobile?4:2);i++)setTimeout(spawnCoin,i*350);setInterval(spawnCoin,mobile?1200:2200);})();"""
          if old not in s:
              raise SystemExit('Target block not found')
          p.write_text(s.replace(old, new), encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add script.js
          git commit -m "Make falling stars visible on mobile" || exit 0
          git push
